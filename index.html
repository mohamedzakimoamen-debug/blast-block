<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سودوكو - Sudoku</title>
    <style>
        :root{--safe-bottom:env(safe-area-inset-bottom,8px)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
        body{background:#1a1a2e;overflow-y:auto;touch-action:manipulation;position:fixed;top:0;left:0;width:100vw;height:100dvh;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center}
        #container{width:100%;max-width:420px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px}
        #header{display:flex;justify-content:space-between;align-items:center;width:100%;color:#fff}
        #header h1{font-size:1.3em;color:#ff9800}
        #difficulty{display:flex;gap:4px}
        .diffBtn{padding:6px 10px;border:none;border-radius:12px;font-size:0.65em;font-weight:bold;cursor:pointer;background:#333;color:#aaa;transition:all 0.2s}
        .diffBtn.active{background:#ff9800;color:#000}
        #info{display:flex;justify-content:space-between;width:100%;color:#ccc;font-size:0.75em}
        #timer{color:#ffd700;font-weight:bold}
        #boardCanvas{width:100%;aspect-ratio:1;border:3px solid #ff9800;border-radius:6px;cursor:pointer;background:#000}
        #numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:100%}
        .numBtn{padding:11px;border:none;border-radius:8px;font-size:1.1em;font-weight:bold;cursor:pointer;background:#16213e;color:#fff;transition:all 0.15s;border:2px solid #0f3460}
        .numBtn:active{background:#ff9800;color:#000;transform:scale(0.9)}
        .numBtn.used{opacity:0.3;pointer-events:none}
        #actions{display:flex;gap:5px;width:100%}
        .actBtn{flex:1;padding:10px;border:none;border-radius:8px;font-size:0.85em;font-weight:bold;cursor:pointer;background:#333;color:#fff;transition:all 0.15s}
        .actBtn:active{transform:scale(0.95)}
        #eraseBtn{background:#f44336}
        #noteBtn{background:#2196F3}
        #noteBtn.active{background:#ff9800;color:#000}
        #newBtn{background:#4caf50}
        #message{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#ffd700;padding:10px 25px;border-radius:20px;font-weight:bold;z-index:100;opacity:0;transition:opacity 0.3s;white-space:nowrap}
        #message.show{opacity:1}
    </style>
</head>
<body>
    <div id="container">
        <div id="header"><h1>🧩 سودوكو</h1>
            <div id="difficulty"><button class="diffBtn active" data-diff="easy">سهل</button><button class="diffBtn" data-diff="medium">متوسط</button><button class="diffBtn" data-diff="hard">صعب</button></div>
        </div>
        <div id="info"><span id="timer">⏱️ 00:00</span><span>🏆 أفضل: <span id="bestTime">--</span></span></div>
        <canvas id="boardCanvas"></canvas>
        <div id="numpad">
            <button class="numBtn">1</button><button class="numBtn">2</button><button class="numBtn">3</button><button class="numBtn">4</button><button class="numBtn">5</button>
            <button class="numBtn">6</button><button class="numBtn">7</button><button class="numBtn">8</button><button class="numBtn">9</button><button class="numBtn" style="background:#ff9800;color:#000">✓</button>
        </div>
        <div id="actions">
            <button class="actBtn" id="eraseBtn">🗑️ مسح</button>
            <button class="actBtn" id="noteBtn">📝 ملاحظات</button>
            <button class="actBtn" id="newBtn">🔄 جديد</button>
        </div>
    </div>
    <div id="message"></div>

    <script>
        const canvas=document.getElementById('boardCanvas');
        const ctx=canvas.getContext('2d');
        const timerEl=document.getElementById('timer');
        const bestEl=document.getElementById('bestTime');
        const messageEl=document.getElementById('message');
        let board=[],solution=[],notes=[],selectedCell=null,noteMode=false,timer=0,timerInterval=null,gameOver=false,difficulty='easy';
        const clues={easy:40,medium:30,hard:22};
        let cellSize=0,boardSize=0,boardX=0,boardY=0;

        function resizeCanvas(){
            const rect=canvas.getBoundingClientRect();
            canvas.width=rect.width*2;
            canvas.height=rect.height*2;
            boardSize=Math.min(canvas.width,canvas.height);
            cellSize=boardSize/9;
            boardX=(canvas.width-boardSize)/2;
            boardY=(canvas.height-boardSize)/2;
            renderBoard();
        }
        window.addEventListener('resize',resizeCanvas);

        function showMessage(msg){messageEl.textContent=msg;messageEl.classList.add('show');setTimeout(()=>messageEl.classList.remove('show'),1800)}

        function generateSudoku(){
            const grid=Array(9).fill().map(()=>Array(9).fill(0));
            function isValid(g,r,c,n){
                for(let i=0;i<9;i++){if(g[r][i]===n||g[i][c]===n)return false}
                const sr=Math.floor(r/3)*3,sc=Math.floor(c/3)*3;
                for(let i=sr;i<sr+3;i++){for(let j=sc;j<sc+3;j++){if(g[i][j]===n)return false}}
                return true;
            }
            function fill(g){
                for(let r=0;r<9;r++){for(let c=0;c<9;c++){if(g[r][c]===0){
                    const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
                    for(let n of nums){if(isValid(g,r,c,n)){g[r][c]=n;if(fill(g))return true;g[r][c]=0}}
                    return false;
                }}}
                return true;
            }
            fill(grid);
            solution=grid.map(r=>[...r]);
            const cellsToRemove=81-clues[difficulty];
            const boardCopy=grid.map(r=>[...r]);
            const positions=[];
            for(let r=0;r<9;r++)for(let c=0;c<9;c++)positions.push([r,c]);
            positions.sort(()=>Math.random()-0.5);
            for(let i=0;i<cellsToRemove;i++){const[r,c]=positions[i];boardCopy[r][c]=0}
            board=boardCopy;
            notes=Array(9).fill().map(()=>Array(9).fill().map(()=>[]));
            selectedCell=null;noteMode=false;gameOver=false;timer=0;
            clearInterval(timerInterval);timerInterval=setInterval(()=>{if(!gameOver){timer++;updateTimer()}},1000);
            updateTimer();resizeCanvas();updateNumPad();
        }

        function updateTimer(){const m=Math.floor(timer/60),s=timer%60;timerEl.textContent=`⏱️ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}

        function renderBoard(){
            resizeCanvas();
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const bs=boardSize,cs=cellSize;
            
            // خلفية
            ctx.fillStyle='#16213e';
            ctx.fillRect(boardX,boardY,bs,bs);
            
            // رسم الخلايا
            for(let r=0;r<9;r++){
                for(let c=0;c<9;c++){
                    const x=boardX+c*cs,y=boardY+r*cs;
                    
                    // تحديد الصف/العمود/المربع
                    if(selectedCell){
                        if(r===selectedCell.r||c===selectedCell.c||
                           (Math.floor(r/3)===Math.floor(selectedCell.r/3)&&Math.floor(c/3)===Math.floor(selectedCell.c/3))){
                            ctx.fillStyle='rgba(15,52,96,0.5)';
                            ctx.fillRect(x,y,cs,cs);
                        }
                        if(board[r][c]!==0&&board[selectedCell.r]&&board[r][c]===board[selectedCell.r][selectedCell.c]){
                            ctx.fillStyle='rgba(255,152,0,0.25)';
                            ctx.fillRect(x,y,cs,cs);
                        }
                    }
                    
                    // الخلية المحددة
                    if(selectedCell&&r===selectedCell.r&&c===selectedCell.c){
                        ctx.fillStyle='#0f3460';
                        ctx.fillRect(x,y,cs,cs);
                        ctx.strokeStyle='#ff9800';
                        ctx.lineWidth=3;
                        ctx.strokeRect(x+2,y+2,cs-4,cs-4);
                    }
                    
                    // الأرقام
                    if(board[r][c]!==0){
                        ctx.fillStyle=solution[r][c]===board[r][c]?'#ffffff':'#4fc3f7';
                        if(solution[r][c]!==board[r][c])ctx.fillStyle='#f44336';
                        ctx.font=`bold ${cs*0.55}px Arial`;
                        ctx.textAlign='center';
                        ctx.textBaseline='middle';
                        ctx.fillText(board[r][c],x+cs/2,y+cs/2);
                    }
                    
                    // ملاحظات
                    if(notes[r][c].length>0&&board[r][c]===0){
                        ctx.fillStyle='#aaaaaa';
                        const ns=cs/3;
                        ctx.font=`${ns*0.6}px Arial`;
                        for(let n=0;n<notes[r][c].length;n++){
                            const num=notes[r][c][n];
                            const nr=Math.floor((num-1)/3),nc=(num-1)%3;
                            ctx.fillText(num,x+nc*ns+ns/2,y+nr*ns+ns/2);
                        }
                    }
                }
            }
            
            // رسم الخطوط
            ctx.strokeStyle='#0f3460';
            ctx.lineWidth=1;
            for(let i=0;i<=9;i++){
                const x=boardX+i*cs,y=boardY+i*cs;
                ctx.beginPath();ctx.moveTo(x,boardY);ctx.lineTo(x,boardY+bs);ctx.stroke();
                ctx.beginPath();ctx.moveTo(boardX,y);ctx.lineTo(boardX+bs,y);ctx.stroke();
            }
            
            // الخطوط السميكة
            ctx.strokeStyle='#ff9800';
            ctx.lineWidth=2.5;
            for(let i=0;i<=9;i+=3){
                const x=boardX+i*cs,y=boardY+i*cs;
                ctx.beginPath();ctx.moveTo(x,boardY);ctx.lineTo(x,boardY+bs);ctx.stroke();
                ctx.beginPath();ctx.moveTo(boardX,y);ctx.lineTo(boardX+bs,y);ctx.stroke();
            }
        }

        canvas.addEventListener('click',(e)=>{
            const rect=canvas.getBoundingClientRect();
            const scaleX=canvas.width/rect.width;
            const scaleY=canvas.height/rect.height;
            const mx=(e.clientX-rect.left)*scaleX;
            const my=(e.clientY-rect.top)*scaleY;
            const c=Math.floor((mx-boardX)/cellSize);
            const r=Math.floor((my-boardY)/cellSize);
            if(r>=0&&r<9&&c>=0&&c<9)selectCell(r,c);
        });

        function selectCell(r,c){
            if(board[r][c]!==0&&solution[r][c]===board[r][c])return;
            selectedCell={r,c};renderBoard();updateNumPad();
        }

        function placeNumber(n){
            if(!selectedCell||gameOver)return;
            const{r,c}=selectedCell;
            if(board[r][c]!==0&&solution[r][c]===board[r][c])return;
            if(noteMode){
                if(board[r][c]===0){
                    if(notes[r][c].includes(n))notes[r][c]=notes[r][c].filter(x=>x!==n);
                    else notes[r][c].push(n);
                }
            }else{
                notes[r][c]=[];
                if(board[r][c]===n){board[r][c]=0}else{board[r][c]=n}
                if(board[r][c]!==0&&solution[r][c]!==board[r][c])showMessage('❌ رقم غلط!');
                if(isComplete()&&isCorrect()){
                    gameOver=true;clearInterval(timerInterval);
                    showMessage('🎉 مبروك! كسبت!');
                    const best=localStorage.getItem('sudokuBest_'+difficulty);
                    if(!best||timer<parseInt(best)){
                        localStorage.setItem('sudokuBest_'+difficulty,timer);
                        bestEl.textContent=formatTime(timer);
                        showMessage('🏆 رقم قياسي جديد!');
                    }
                }
            }
            renderBoard();updateNumPad();
        }

        function eraseCell(){
            if(!selectedCell||gameOver)return;
            const{r,c}=selectedCell;
            if(board[r][c]!==0&&solution[r][c]!==board[r][c]){board[r][c]=0;notes[r][c]=[]}
            renderBoard();updateNumPad();
        }

        function updateNumPad(){
            const btns=document.querySelectorAll('.numBtn');
            btns.forEach((btn,i)=>{
                if(i<9){
                    const n=i+1;
                    let count=0;
                    for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(board[r][c]===n)count++;
                    btn.classList.toggle('used',count>=9);
                }
            });
        }

        function isComplete(){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(board[r][c]===0)return false;return true}
        function isCorrect(){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(board[r][c]!==solution[r][c])return false;return true}
        function formatTime(t){const m=Math.floor(t/60),s=t%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}

        document.querySelectorAll('.diffBtn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                document.querySelectorAll('.diffBtn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                difficulty=btn.dataset.diff;
                generateSudoku();
                const best=localStorage.getItem('sudokuBest_'+difficulty);
                bestEl.textContent=best?formatTime(parseInt(best)):'--';
            });
        });
        document.querySelectorAll('.numBtn').forEach((btn,i)=>{
            btn.addEventListener('click',()=>{
                if(i<9)placeNumber(i+1);
                else{noteMode=!noteMode;document.getElementById('noteBtn').classList.toggle('active',noteMode);}
            });
        });
        document.getElementById('eraseBtn').addEventListener('click',eraseCell);
        document.getElementById('noteBtn').addEventListener('click',()=>{
            noteMode=!noteMode;document.getElementById('noteBtn').classList.toggle('active',noteMode);
        });
        document.getElementById('newBtn').addEventListener('click',()=>{
            generateSudoku();
            const best=localStorage.getItem('sudokuBest_'+difficulty);
            bestEl.textContent=best?formatTime(parseInt(best)):'--';
        });

        generateSudoku();
        const best=localStorage.getItem('sudokuBest_easy');
        bestEl.textContent=best?formatTime(parseInt(best)):'--';
    </script>
</body>
</html>
