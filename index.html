<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Bird - فلابي بيرد</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
        body{background:#000;overflow:hidden;touch-action:manipulation;position:fixed;top:0;left:0;width:100vw;height:100dvh;font-family:Arial,sans-serif}
        canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
        #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
        #scorePanel{position:absolute;top:50px;left:50%;transform:translateX(-50%);text-align:center}
        #scoreText{color:#fff;font-size:4em;font-weight:bold;text-shadow:0 4px 8px rgba(0,0,0,0.5)}
        #bestText{color:#ffd700;font-size:1em;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
        #gameOverPanel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);padding:25px 35px;border-radius:20px;border:3px solid #ff9800;text-align:center;display:none}
        #gameOverPanel h2{color:#ff9800;font-size:2em;margin-bottom:10px}
        #gameOverPanel p{color:#fff;font-size:1.2em;margin:5px 0}
        #gameOverPanel button{margin-top:15px;padding:12px 30px;background:#4caf50;color:#fff;border:none;border-radius:25px;font-size:1.1em;font-weight:bold;cursor:pointer;pointer-events:auto}
        #startMsg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.1em;text-align:center;text-shadow:0 0 15px rgba(0,0,0,0.7);animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}
        #medalBadge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;display:none}
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div id="scorePanel"><div id="scoreText">0</div><div id="bestText">🏆 أفضل: 0</div></div>
        <div id="gameOverPanel"><h2>💀 خسرت!</h2><p>نتيجتك: <span id="fs">0</span></p><p id="medalMsg"></p><p>🏆 أفضل: <span id="fb">0</span></p><button id="rb">🔄 العب تاني</button></div>
        <div id="startMsg">👆 اضغط لتطير</div>
        <div id="medalBadge"></div>
    </div>
    <script>
        const c=document.getElementById('c'),ctx=c.getContext('2d');
        let W,H;
        function R(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}R();window.addEventListener('resize',R);

        // الطائر
        let bird={x:0,y:0,vy:0,size:0,rotation:0};
        // المواسير
        let pipes=[];
        // الأرض
        let groundY=0,groundSpeed=2;
        // اللعبة
        let score=0,best=parseInt(localStorage.getItem('flappyBest')||'0');
        let gameState='start'; // start, playing, over
        let frameCount=0;
        let pipeGap=0,pipeWidth=0;
        // غيوم
        let clouds=[];

        function init(){
            bird.size=Math.min(W,H)*0.055;
            bird.x=W*0.25;
            bird.y=H*0.4;
            bird.vy=0;
            bird.rotation=0;
            pipeGap=bird.size*5.5;
            pipeWidth=bird.size*2.2;
            groundY=H-H*0.12;
            pipes=[];
            score=0;
            frameCount=0;
            groundSpeed=2;
            // غيوم
            clouds=[];
            for(let i=0;i<5;i++){
                clouds.push({x:Math.random()*W,y:20+Math.random()*H*0.3,size:30+Math.random()*40,speed:0.3+Math.random()*0.5});
            }
            updateUI();
        }

        function updateUI(){
            document.getElementById('scoreText').textContent=score;
            document.getElementById('bestText').textContent='🏆 أفضل: '+best;
            if(gameState==='over'){
                document.getElementById('gameOverPanel').style.display='block';
                document.getElementById('fs').textContent=score;
                document.getElementById('fb').textContent=best;
                document.getElementById('startMsg').style.display='none';
                let medal='';
                if(score>=50)medal='🥇 ميدالية ذهبية!';
                else if(score>=30)medal='🥈 ميدالية فضية!';
                else if(score>=15)medal='🥉 ميدالية برونزية!';
                else medal='😢 حاول تاني';
                document.getElementById('medalMsg').textContent=medal;
                document.getElementById('medalBadge').textContent=score>=50?'🥇':score>=30?'🥈':score>=15?'🥉':'';
                document.getElementById('medalBadge').style.display='block';
            }else{
                document.getElementById('gameOverPanel').style.display='none';
                document.getElementById('medalBadge').style.display='none';
                document.getElementById('startMsg').style.display=gameState==='start'?'block':'none';
            }
        }

        function flap(){
            if(gameState==='start'){
                gameState='playing';
                document.getElementById('startMsg').style.display='none';
                bird.vy=-bird.size*0.25;
            }else if(gameState==='playing'){
                bird.vy=-bird.size*0.25;
            }
        }

        function restart(){
            init();
            gameState='start';
            updateUI();
        }

        function spawnPipe(){
            const minY=groundY-H*0.25;
            const maxY=H*0.12+pipeGap;
            const topHeight=Math.random()*(minY-maxY)+maxY-pipeGap/2;
            pipes.push({
                x:W+pipeWidth,
                topHeight:topHeight,
                passed:false
            });
        }

        function update(){
            if(gameState!=='playing')return;
            frameCount++;

            // جاذبية
            bird.vy+=0.45;
            bird.y+=bird.vy;
            bird.rotation=Math.min(Math.PI/3,bird.vy*0.08);

            // حدود الشاشة
            if(bird.y<0){bird.y=0;bird.vy=0;}
            if(bird.y+bird.size>groundY){die();}

            // حركة المواسير
            if(frameCount%Math.max(40,90-Math.floor(score/5))===0){
                spawnPipe();
            }

            groundSpeed=2+score*0.02;

            for(let pipe of pipes){
                pipe.x-=groundSpeed;
                // اصطدام
                if(bird.x+bird.size>pipe.x && bird.x<pipe.x+pipeWidth){
                    if(bird.y<pipe.topHeight+pipeGap/2 && bird.y>pipe.topHeight-pipeGap/2){
                        // عدى من الفتحة
                        if(!pipe.passed && bird.x>pipe.x+pipeWidth/2){
                            pipe.passed=true;
                            score++;
                            if(score>best){best=score;localStorage.setItem('flappyBest',best);}
                            updateUI();
                        }
                    }else{
                        die();
                    }
                }
            }

            // اصطدام بالأرض
            if(bird.y+bird.size>=groundY)die();

            // تنظيف المواسير
            pipes=pipes.filter(p=>p.x>-pipeWidth*2);

            // حركة الغيوم
            for(let cloud of clouds){
                cloud.x-=cloud.speed;
                if(cloud.x<-cloud.size)cloud.x=W+cloud.size;
            }

            updateUI();
        }

        function die(){
            gameState='over';
            bird.vy=-bird.size*0.2;
            updateUI();
            setTimeout(()=>{
                document.getElementById('gameOverPanel').style.display='block';
            },300);
        }

        function drawSky(){
            const grad=ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0,'#4fc3f7');
            grad.addColorStop(0.6,'#81d4fa');
            grad.addColorStop(1,'#b3e5fc');
            ctx.fillStyle=grad;
            ctx.fillRect(0,0,W,H);
        }

        function drawClouds(){
            ctx.fillStyle='rgba(255,255,255,0.9)';
            for(let cloud of clouds){
                ctx.beginPath();
                ctx.arc(cloud.x,cloud.y,cloud.size*0.6,0,Math.PI*2);
                ctx.arc(cloud.x+cloud.size*0.4,cloud.y-cloud.size*0.2,cloud.size*0.5,0,Math.PI*2);
                ctx.arc(cloud.x+cloud.size*0.8,cloud.y,cloud.size*0.55,0,Math.PI*2);
                ctx.arc(cloud.x+cloud.size*0.4,cloud.y+cloud.size*0.15,cloud.size*0.45,0,Math.PI*2);
                ctx.fill();
            }
        }

        function drawBird(){
            ctx.save();
            ctx.translate(bird.x,bird.y);
            ctx.rotate(bird.rotation);

            // جسم
            const s=bird.size;
            ctx.fillStyle='#fdd835';
            ctx.beginPath();
            ctx.ellipse(0,0,s*1.1,s*0.9,0,0,Math.PI*2);
            ctx.fill();

            // بطن
            ctx.fillStyle='#fff9c4';
            ctx.beginPath();
            ctx.ellipse(-s*0.1,s*0.2,s*0.6,s*0.5,0,0,Math.PI*2);
            ctx.fill();

            // عين
            ctx.fillStyle='#fff';
            ctx.beginPath();
            ctx.arc(s*0.6,-s*0.2,s*0.3,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#000';
            ctx.beginPath();
            ctx.arc(s*0.7,-s*0.2,s*0.15,0,Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#fff';
            ctx.beginPath();
            ctx.arc(s*0.73,-s*0.23,s*0.05,0,Math.PI*2);
            ctx.fill();

            // منقار
            ctx.fillStyle='#ff6d00';
            ctx.beginPath();
            ctx.moveTo(s*0.9,-s*0.1);
            ctx.lineTo(s*1.5,s*0.05);
            ctx.lineTo(s*0.9,s*0.2);
            ctx.closePath();
            ctx.fill();

            // جناح
            ctx.fillStyle='#f9a825';
            ctx.beginPath();
            ctx.ellipse(-s*0.2,-s*0.1,s*0.7,s*0.4,-0.3,0,Math.PI*2);
            ctx.fill();

            // رجلين
            ctx.fillStyle='#ff6d00';
            ctx.fillRect(-s*0.2,s*0.7,s*0.12,s*0.5);
            ctx.fillRect(s*0.2,s*0.7,s*0.12,s*0.5);

            ctx.restore();
        }

        function drawPipes(){
            for(let pipe of pipes){
                const x=pipe.x;
                const gap=pipeGap;
                const topH=pipe.topHeight;
                const w=pipeWidth;

                // الماسورة العلوية
                const pipeGrad=ctx.createLinearGradient(x,0,x+w,0);
                pipeGrad.addColorStop(0,'#4caf50');
                pipeGrad.addColorStop(0.3,'#66bb6a');
                pipeGrad.addColorStop(0.7,'#43a047');
                pipeGrad.addColorStop(1,'#2e7d32');
                ctx.fillStyle=pipeGrad;
                ctx.fillRect(x,0,w,topH-gap/2);
                // غطاء
                ctx.fillStyle='#388e3c';
                ctx.fillRect(x-w*0.15,topH-gap/2-w*0.25,w*1.3,w*0.25);

                // الماسورة السفلية
                const bottomY=topH+gap/2;
                ctx.fillStyle=pipeGrad;
                ctx.fillRect(x,bottomY,w,groundY-bottomY);
                // غطاء
                ctx.fillStyle='#388e3c';
                ctx.fillRect(x-w*0.15,bottomY,w*1.3,w*0.25);
            }
        }

        function drawGround(){
            ctx.fillStyle='#8d6e63';
            ctx.fillRect(0,groundY,W,H-groundY);
            ctx.fillStyle='#6d4c41';
            ctx.fillRect(0,groundY,W,4);
            // عشب
            ctx.fillStyle='#4caf50';
            ctx.fillRect(0,groundY-2,W,5);
            for(let i=0;i<W;i+=15){
                ctx.fillStyle='#66bb6a';
                ctx.beginPath();
                ctx.moveTo(i,groundY);
                ctx.lineTo(i+4,groundY-8);
                ctx.lineTo(i+8,groundY);
                ctx.fill();
            }
        }

        function draw(){
            ctx.clearRect(0,0,W,H);
            drawSky();
            drawClouds();
            drawPipes();
            drawGround();
            drawBird();
        }

        function gameLoop(){
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // أحداث
        c.addEventListener('touchstart',e=>{e.preventDefault();flap()},{passive:false});
        c.addEventListener('mousedown',e=>{e.preventDefault();flap()});
        document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});
        document.getElementById('rb').addEventListener('click',restart);
        document.getElementById('rb').addEventListener('touchstart',e=>{e.preventDefault();restart()},{passive:false});

        init();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
